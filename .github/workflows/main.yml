name: Build TARS APK (Offline)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # This lets you manually click "Run workflow" anytime

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦆 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.4'  # Stable version compatible with the repo
          channel: 'stable'

      - name: 📦 Get Flutter Dependencies
        run: flutter pub get

      - name: 🔧 Setup Android NDK (Critical for llama.cpp)
        run: |
          echo "y" | sdkmanager "ndk;25.1.8937393"
          echo "ndk.dir=$ANDROID_HOME/ndk/25.1.8937393" >> local.properties

      - name: 🚀 Build Release APK (Split by ABI)
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TARS-Offline-APK
          path: build/app/outputs/flutter-apk/*.apk
