name: private_agent
description: A private AI assistant agent for Android.
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  shizuku_api: ^1.2.2
  # ... (keep all your other existing dependencies listed here)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# ⚠️ IMPORTANT: This block MUST be at the root level (same indent as "dependencies")
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app-logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
